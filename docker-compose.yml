version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3
    container_name: nearwise_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: nearwise
    ports:
      - "5432:5432"
    volumes:
      - nearwise_pgdata:/var/lib/postgresql/data

volumes:
  nearwise_pgdata: